modparam("dispatcher", "ds_probing_threshold", 10)
modparam("dispatcher", "ds_probing_sock", "udp:145.63.134.84:5060")
modparam("dispatcher", "ds_ping_from", "sip:opensips@145.63.134.84")
modparam("dispatcher", "options_reply_codes", "501,403,404,400,200")

loadmodule "drouting.so"
modparam("drouting", "db_url", "postgres://opensips:opensipsrw@localhost/opensips")
modparam("drouting", "probing_from", "sip:sbc@145.63.134.84")
